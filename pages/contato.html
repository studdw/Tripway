<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
<body>
    <header>
        <h1>Bem vindos á página de Contato</h1>
        <p>Aqui é a pagina que você cosegue entrar em contato com a gente!</p>
    </header>

    <nav>
        <ul>
            <li><h2><a href="contato.html">Contato</a></h2></li>
            <li><h2><a href="destinos.html">Destinos</a></h2></li>
            <li><h2><a href="pacotes.html">Pacotes</a></h2></li>
        </ul>
    </nav>
    <section>
        <h2>Preencha para contato</h2>
        <h3>
            <form>
                <label for="name">Nome:</label>
                <input type="text" id="name" placeholder="Ex: Lucas Kaftan" required>

                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="Ex: nome@gmail.com" required>

                <label for="destino">Destino:</label>
                <select name="destino" id="destino" required>
                    <option value="matchu">Machu picchu</option>
                    <option value="eiffel">Torre Eiffel</option>
                    <option value="muralha">Muralha da china</option>
                    <option value="cristo">Cristo Redentor</option>
                    <option value="coliseu">Coliseu</option>
                </select>

                <label for="date">Data: </label>
                <input type="date" id="date" required>

                <label for="people">Quantidade de pessoas:</label>
                <select name="" id="people" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                </select>

                <label for="mensage">Mensagem</label>
                <input type="text" id="mensage" placeholder="Ex: Tenho medo de altura" required>

                <button>Enviar</button>
            </form>
        </h3>
    </section> 
    <main>
        <p>Qualquer sugestão é só nos enviar</p>
        <img src="..//imagens/Instagram_Glyph_Gradient.png" alt="imagem-instagram">
    </main>

    <footer><a href="..//index.html">Voltar à página inicial</a></footer>
</body>
</html>
